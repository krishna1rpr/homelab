services:
  code-server:
    build: .
    container_name: code-server

    ports:
      - "80:8080"

    volumes:
      - C:/C_DEVELOPMENT/remote/projects:/workspace
      - code-server-data:/home/coder/.local

    environment:
      - PASSWORD=yourpassword

    restart: unless-stopped

volumes:
  code-server-data:



