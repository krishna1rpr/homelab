services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      # - "8000:8000" # Optional, for Edge compute features
      # - "9443:9443" # Main UI port (HTTPS)
      - "9000:9000" # Main UI port (HTTP)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
